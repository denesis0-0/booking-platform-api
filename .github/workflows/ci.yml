name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: booking
          POSTGRES_PASSWORD: booking
          POSTGRES_DB: booking
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U booking -d booking"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://booking:booking@localhost:5432/booking?sslmode=disable

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: test -z "$(gofmt -l cmd internal)"

      - name: Apply migrations
        run: psql "$DATABASE_URL" < migrations/001_create_tables.sql

      - name: Run tests
        run: go test ./...